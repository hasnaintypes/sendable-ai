name: Close Stale Issues and PRs

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Clean up stale issues and PRs
    runs-on: ubuntu-latest
    
    steps:
      - name: Stale Issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Issues
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had any activity for 30 days.
            
            It will be closed in 7 days if no further activity occurs.
            
            If you believe this issue is still relevant, please leave a comment and we'll keep it open.
            
            Thank you for your contributions!
          close-issue-message: |
            This issue has been automatically closed due to inactivity.
            
            If you believe this is still relevant, feel free to reopen it or create a new issue with updated information.
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,roadmap,in-progress'
          
          # Pull Requests
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had any activity for 14 days.
            
            It will be closed in 7 days if no further activity occurs.
            
            If you're still working on this, please leave a comment and we'll keep it open.
            
            Thank you for your contributions!
          close-pr-message: |
            This pull request has been automatically closed due to inactivity.
            
            If you'd like to continue working on this, feel free to reopen it or create a new PR.
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,in-progress,needs-review'
          
          # General settings
          operations-per-run: 100
          remove-stale-when-updated: true
          ascending: true
